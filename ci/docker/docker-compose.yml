# 仓库根目录：docker compose -f ci/docker/docker-compose.yml up --build
# 本目录：docker compose -f docker-compose.yml up --build

services:
  app:
    build:
      context: ../..
      dockerfile: ci/docker/Dockerfile
    image: tms:local
    container_name: tms-app
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/tms?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: tms
      SPRING_DATASOURCE_PASSWORD: tms_local
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      MYBATIS_PLUS_CONFIGURATION_LOG_IMPL: org.apache.ibatis.logging.slf4j.Slf4jImpl
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -o /dev/null http://127.0.0.1:8080/v3/api-docs || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

volumes:
  tms_mysql_data:
